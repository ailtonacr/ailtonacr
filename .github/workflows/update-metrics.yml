name: Update profile metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate metrics
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ailtonacr
        run: python scripts/generate_metrics.py

      - name: Validate generated SVG files
        run: |
          python - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree

          files = [
              Path("assets/github-activity-light.svg"),
              Path("assets/github-activity-dark.svg"),
          ]
          for file in files:
              if not file.exists() or file.stat().st_size < 1_000:
                  raise SystemExit(f"Invalid generated file: {file}")
              ElementTree.parse(file)
              print(f"Validated {file} ({file.stat().st_size} bytes)")
          PY

      - name: Commit updated metrics
        run: |
          if git diff --quiet -- assets/; then
            echo "Metrics are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-activity-light.svg assets/github-activity-dark.svg
          git commit -m "chore: update profile metrics"
          git push
